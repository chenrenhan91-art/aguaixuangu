name: Refresh A-Share Snapshot

on:
  workflow_dispatch:
  schedule:
    # Beijing 12:05
    - cron: "5 4 * * 1-5"
    # Beijing 15:05
    - cron: "5 7 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      A_SHARE_GEMINI_API_KEY: ${{ secrets.A_SHARE_GEMINI_API_KEY }}
      A_SHARE_GEMINI_MODEL: gemini-3-pro-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./backend[dev]

      - name: Generate latest selector snapshot
        run: python -m data_pipeline.jobs.generate_daily_candidates

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/processed/daily_candidates_latest.json data/processed/daily_candidates_*.json
          git commit -m "chore: refresh selector snapshot"
          git push
