services:
  - type: web
    name: aguaixuangu
    runtime: python
    buildCommand: pip install -e ./backend
    startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: A_SHARE_ENVIRONMENT
        value: production
      - key: A_SHARE_DATA_DIR
        value: ./data
      - key: A_SHARE_GEMINI_MODEL
        value: gemini-3-pro-preview
